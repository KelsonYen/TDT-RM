name: Probe market data fetch from GitHub Actions

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: Market date to probe (YYYY-MM-DD). Leave blank for runner UTC date.
        required: false
        type: string
  schedule:
    # 09:10 UTC is after the regular Taiwan cash-market close and after many public feeds update.
    - cron: '10 9 * * 1-5'

permissions:
  contents: read

jobs:
  probe-market-data:
    name: Probe TDT-RM data sources
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AS_OF: ${{ github.event.inputs.as_of || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: python -m pip install -e .

      - name: Probe official public market data endpoints
        run: |
          set -euo pipefail
          args=()
          if [ -n "${AS_OF:-}" ]; then
            args+=(--as-of "$AS_OF")
          fi
          python scripts/probe_github_actions_market_data.py "${args[@]}" --output-dir outputs/github_actions_market_data_probe

      - name: Publish probe report in job summary
        if: always()
        run: |
          if [ -f outputs/github_actions_market_data_probe/probe_report.md ]; then
            cat outputs/github_actions_market_data_probe/probe_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Probe report was not generated.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload probe artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: github-actions-market-data-probe
          path: outputs/github_actions_market_data_probe/
