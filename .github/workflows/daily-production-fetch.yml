name: Daily Production Data Fetch

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: "Taiwan market trade date to fetch (YYYY-MM-DD). Use 2026-06-04 to validate the blocked Codex run."
        required: true
        default: "2026-06-04"
        type: string
      allow_finmind:
        description: "Explicitly allow FinMind if the configured providers and environment opt in. Disabled by default."
        required: false
        default: false
        type: boolean
  schedule:
    # 18:30 Asia/Taipei (10:30 UTC), Monday-Friday.
    - cron: "30 10 * * 1-5"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  TDT_RM_PRODUCTION_MODE: "true"
  TDT_RM_ALLOW_FINMIND_LIVE: ${{ (github.event_name == 'workflow_dispatch' && inputs.allow_finmind) && 'true' || 'false' }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

jobs:
  production-fetch:
    name: Fetch and validate production data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve as_of date
        id: as-of
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.as_of || '' }}"
          if [[ -n "$requested" ]]; then
            as_of="$requested"
          else
            as_of="$(TZ=Asia/Taipei date +%F)"
          fi
          if [[ ! "$as_of" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "as_of must use YYYY-MM-DD, got: $as_of" >&2
            exit 1
          fi
          echo "as_of=$as_of" >> "$GITHUB_OUTPUT"
          echo "AS_OF=$as_of" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run production fetch and pipeline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/fetch_daily_provider_csvs.py \
            --as-of "$AS_OF" \
            --output-dir "inputs/daily/$AS_OF/" \
            --run-pipeline \
            --pipeline-output-dir "outputs/daily/$AS_OF/" \
            --json-summary "outputs/daily/$AS_OF/summary.json"

      - name: Write GitHub step summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          as_of = os.environ["AS_OF"]
          input_dir = Path("inputs/daily") / as_of
          output_dir = Path("outputs/daily") / as_of
          manifest_path = input_dir / "fetch_manifest.json"
          summary_path = output_dir / "summary.json"
          required = ["price", "foreign_flow", "fx", "breadth", "futures", "options", "leadership", "margin"]

          manifest = {}
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          summary = {}
          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))

          provider_paths = manifest.get("provider_csv_paths") if isinstance(manifest.get("provider_csv_paths"), dict) else {}
          missing = manifest.get("missing_production_csvs") if isinstance(manifest.get("missing_production_csvs"), list) else []
          attempts = manifest.get("source_attempts") if isinstance(manifest.get("source_attempts"), list) else []
          selected = {}
          for attempt in attempts:
              if not isinstance(attempt, dict) or not attempt.get("success"):
                  continue
              selected.setdefault(str(attempt.get("provider_category")), attempt)

          pipeline = summary.get("pipeline") if isinstance(summary.get("pipeline"), dict) else None
          if pipeline is None:
              pipeline_status = "not run or failed before pipeline completion"
          elif pipeline.get("validation", {}).get("has_errors"):
              pipeline_status = "failed validation"
          else:
              pipeline_status = "completed"

          print("## Production fetch validation")
          print()
          print(f"- as_of: `{as_of}`")
          print(f"- price.csv: `{'written' if 'price' in provider_paths and (input_dir / 'price.csv').exists() else 'missing'}`")
          print(f"- required production CSVs present: `{', '.join(cat for cat in required if cat in provider_paths) or 'none'}`")
          print(f"- required production CSVs missing: `{', '.join(str(item) for item in (missing or [cat for cat in required if cat not in provider_paths])) or 'none'}`")
          print(f"- data_status: `{manifest.get('data_status', 'unknown')}`")
          print(f"- pipeline status: `{pipeline_status}`")
          print()
          print("### Provider source used per category")
          print("| Category | Source | Source type | Retry attempts |")
          print("| --- | --- | --- | --- |")
          for category in required:
              attempt = selected.get(category)
              if attempt:
                  print(f"| `{category}` | `{attempt.get('source_id')}` | `{attempt.get('source_type')}` | `{attempt.get('retry_attempts', 0)}` |")
              else:
                  print(f"| `{category}` | `missing` | `n/a` | `0` |")
          print()
          print("### Uploaded artifact paths")
          print(f"- `{input_dir}/`")
          print(f"- `{output_dir}/`")
          print(f"- `{manifest_path}`")
          print(f"- `{summary_path}`")
          PY

      - name: Upload production fetch artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tdt-rm-production-fetch-${{ steps.as-of.outputs.as_of }}
          path: |
            inputs/daily/${{ steps.as-of.outputs.as_of }}/
            outputs/daily/${{ steps.as-of.outputs.as_of }}/
            inputs/daily/${{ steps.as-of.outputs.as_of }}/fetch_manifest.json
            outputs/daily/${{ steps.as-of.outputs.as_of }}/summary.json
          if-no-files-found: warn
          retention-days: 90
