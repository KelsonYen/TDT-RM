name: Daily Production Data Fetch

on:
  workflow_dispatch:
    inputs:
      trade_date:
        description: "Taiwan market trade date to fetch (YYYY-MM-DD). Leave blank to use today's date in Asia/Taipei."
        required: false
        type: string
  schedule:
    # 18:30 Asia/Taipei (10:30 UTC), Monday-Friday.
    # This starts after the official same-day release windows for TWSE T86
    # foreign-flow data and final TWSE end-of-day market reports.
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  TDT_RM_PRODUCTION_MODE: "true"

jobs:
  production-fetch:
    name: Fetch and validate production data
    runs-on: ubuntu-latest
    timeout-minutes: 210

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve trade date
        id: trade-date
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.trade_date || '' }}"
          if [[ -n "$requested" ]]; then
            trade_date="$requested"
          else
            trade_date="$(TZ=Asia/Taipei date +%F)"
          fi
          if [[ ! "$trade_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "trade_date must use YYYY-MM-DD, got: $trade_date" >&2
            exit 1
          fi
          echo "trade_date=$trade_date" >> "$GITHUB_OUTPUT"
          echo "TRADE_DATE=$trade_date" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install requirements
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install -e .

      - name: Run official-source-first production fetch and report
        shell: bash
        run: |
          set -euo pipefail
          extra_args=()
          if [[ -n "${FINMIND_TOKEN:-}" ]]; then
            extra_args+=(--allow-finmind-live)
          fi

          # Same-day official rows can appear after the first post-close run.
          # Retry the whole fail-closed fetch/report command without weakening
          # provider validation or accepting stale/synthetic data.
          max_attempts=6
          delay_seconds=1800
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Production fetch attempt ${attempt}/${max_attempts} for ${TRADE_DATE}."
            if python scripts/run_github_actions_production_fetch.py \
              --trade-date "$TRADE_DATE" \
              --source-config config/public_data_sources.json \
              "${extra_args[@]}"; then
              exit 0
            fi
            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "Production fetch remained fail-closed after ${max_attempts} attempts." >&2
              exit 1
            fi
            echo "Official same-day rows may still be unpublished; retrying in ${delay_seconds} seconds."
            sleep "$delay_seconds"
          done

      - name: Commit production CSVs and reports
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "inputs/daily/${TRADE_DATE}" "reports/daily/${TRADE_DATE}"
          if git diff --cached --quiet; then
            echo "No production artifacts changed for ${TRADE_DATE}."
          else
            git commit -m "Add production daily artifacts for ${TRADE_DATE}"
            git pull --rebase
            git push
          fi

      - name: Write GitHub step summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary_path="reports/daily/${TRADE_DATE}/artifacts/run_summary.json"
          {
            echo "## Daily Production Data Fetch"
            echo
            echo "Trade date: ${TRADE_DATE}"
            echo
            if [[ -f "$summary_path" ]]; then
              echo "Run summary artifact: \`$summary_path\`"
            else
              echo "Run summary artifact was not written before job termination."
            fi
            echo
            echo "Expected artifact roots:"
            echo "- \`inputs/daily/${TRADE_DATE}/\`"
            echo "- \`inputs/daily/${TRADE_DATE}/_strict_provider_csvs/\`"
            echo "- \`reports/daily/${TRADE_DATE}/artifacts/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production inputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tdt-rm-production-inputs-${{ steps.trade-date.outputs.trade_date }}
          path: |
            inputs/daily/${{ steps.trade-date.outputs.trade_date }}/
            !inputs/daily/${{ steps.trade-date.outputs.trade_date }}/_strict_provider_csvs/**
          if-no-files-found: warn
          retention-days: 90

      - name: Upload fetched raw and normalized provider files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tdt-rm-provider-fetch-files-${{ steps.trade-date.outputs.trade_date }}
          path: |
            inputs/daily/${{ steps.trade-date.outputs.trade_date }}/_strict_provider_csvs/
            reports/daily/${{ steps.trade-date.outputs.trade_date }}/artifacts/raw/
            reports/daily/${{ steps.trade-date.outputs.trade_date }}/artifacts/normalized/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload production reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tdt-rm-production-reports-${{ steps.trade-date.outputs.trade_date }}
          path: reports/daily/${{ steps.trade-date.outputs.trade_date }}/
          if-no-files-found: warn
          retention-days: 90
