name: Daily Production Data Fetch

on:
  workflow_dispatch:
    inputs:
      trade_date:
        description: "Taiwan market trade date to fetch (YYYY-MM-DD). Use 2026-06-04 for the post-PR #87 completed trading day rerun."
        required: true
        default: "2026-06-04"
        type: string
      as_of:
        description: "Deprecated alias for trade_date (YYYY-MM-DD). Leave blank unless using older dispatch clients."
        required: false
        default: ""
        type: string
      allow_finmind:
        description: "Explicitly allow FinMind if the configured providers and environment opt in. Disabled by default."
        required: false
        default: false
        type: boolean
  schedule:
    # 00:30 UTC is 08:30 Asia/Taipei, Monday-Friday.
    - cron: "30 0 * * 1-5"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  TDT_RM_PRODUCTION_MODE: "true"
  TDT_RM_ALLOW_FINMIND_LIVE: ${{ (github.event_name == 'workflow_dispatch' && (inputs.allow_finmind || github.event.inputs.allow_finmind == 'true')) && 'true' || 'false' }}
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}

jobs:
  production-fetch:
    name: Fetch and validate production data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve trade_date
        id: as-of
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.trade_date || github.event.inputs.as_of || '' }}"
          if [[ -n "$requested" ]]; then
            trade_date="$requested"
          else
            trade_date="$(TZ=Asia/Taipei date +%F)"
          fi
          if [[ ! "$trade_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "trade_date must use YYYY-MM-DD, got: $trade_date" >&2
            exit 1
          fi
          echo "as_of=$trade_date" >> "$GITHUB_OUTPUT"
          echo "trade_date=$trade_date" >> "$GITHUB_OUTPUT"
          echo "AS_OF=$trade_date" >> "$GITHUB_ENV"

      - name: Require FinMind token when explicitly enabled
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.allow_finmind || github.event.inputs.allow_finmind == 'true') }}
        shell: bash
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${FINMIND_TOKEN:-}" && -z "${FINMIND_API_TOKEN:-}" ]]; then
            echo "allow_finmind=true requires FINMIND_TOKEN or FINMIND_API_TOKEN GitHub Secret." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Prepare Python path
        shell: bash
        run: |
          set -euo pipefail
          echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE/scripts:${PYTHONPATH:-}" >> "$GITHUB_ENV"
          python - <<'PY'
          import sys
          from pathlib import Path

          root = Path.cwd()
          sys.path.insert(0, str(root / "src"))
          import tdt_rm  # noqa: F401
          PY

      - name: Run provider connectivity audit
        shell: bash
        env:
          FINMIND_TOKEN: ${{ (github.event_name == 'workflow_dispatch' && (inputs.allow_finmind || github.event.inputs.allow_finmind == 'true')) && secrets.FINMIND_TOKEN || '' }}
          FINMIND_API_TOKEN: ${{ (github.event_name == 'workflow_dispatch' && (inputs.allow_finmind || github.event.inputs.allow_finmind == 'true')) && secrets.FINMIND_API_TOKEN || '' }}
        run: |
          set -euo pipefail
          python scripts/audit_market_data_connectivity.py \
            --as-of "$AS_OF" \
            --output-dir "outputs/daily/$AS_OF/provider_connectivity_audit" \
            --repeat 2

      - name: Run production fetch and pipeline
        shell: bash
        run: |
          set -euo pipefail
          echo "inputs.allow_finmind=${{ inputs.allow_finmind }}"
          echo "github.event.inputs.allow_finmind=${{ github.event.inputs.allow_finmind }}"
          echo "TDT_RM_ALLOW_FINMIND_LIVE=${TDT_RM_ALLOW_FINMIND_LIVE:-false}"

          args=(--trade-date "$AS_OF")
          if [[ "${TDT_RM_ALLOW_FINMIND_LIVE:-false}" == "true" || "${{ inputs.allow_finmind }}" == "true" || "${{ github.event.inputs.allow_finmind }}" == "true" ]]; then
            if [[ -z "${FINMIND_TOKEN:-}" && -z "${FINMIND_API_TOKEN:-}" ]]; then
              echo "allow_finmind=true requires FINMIND_TOKEN or FINMIND_API_TOKEN GitHub Secret." >&2
              exit 1
            fi
            echo "FinMind fallback enabled for production because allow_finmind=true and a token secret is present."
            args+=(--allow-finmind-live)
          else
            echo "FinMind fallback disabled; official-source-first provider chain must complete without live FinMind fallback."
          fi

          printf 'Production fetch args:'
          printf ' %q' "${args[@]}"
          printf '\n'

          python scripts/run_github_actions_production_fetch.py "${args[@]}"

      - name: Verify fetch artifact contract
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from datetime import date
          from pathlib import Path
          from scripts.run_github_actions_production_fetch import validate_fetch_artifact_contract

          as_of = os.environ["AS_OF"]
          validate_fetch_artifact_contract(
              trade_date=date.fromisoformat(as_of),
              outputs_dir=Path("outputs/daily") / as_of,
              reports_dir=Path("reports/daily") / as_of,
              staging_dir=Path("inputs/daily") / as_of / "_strict_provider_csvs",
          )
          PY

      - name: Run daily production pipeline
        shell: bash
        run: |
          set -euo pipefail
          status_file="outputs/daily/$AS_OF/daily_pipeline_status.txt"
          mkdir -p "$(dirname "$status_file")"
          provider_input_dir="inputs/daily/$AS_OF/_strict_provider_csvs"
          daily_input_dir="inputs/daily/$AS_OF"
          for csv in price.csv foreign_flow.csv fx.csv breadth.csv futures.csv options.csv leadership.csv margin.csv; do
            if [[ -f "$provider_input_dir/$csv" && ! -f "$daily_input_dir/$csv" ]]; then
              cp "$provider_input_dir/$csv" "$daily_input_dir/$csv"
            fi
          done
          if [[ -f "$provider_input_dir/provider_field_map.json" && ! -f "$daily_input_dir/provider_field_map.json" ]]; then
            cp "$provider_input_dir/provider_field_map.json" "$daily_input_dir/provider_field_map.json"
          fi
          set +e
          python scripts/run_daily_production_pipeline.py \
            --trade-date "$AS_OF" \
            --input-dir "inputs/daily/$AS_OF" \
            --outputs-dir "outputs/daily/$AS_OF" \
            --reports-dir "reports/daily/$AS_OF"
          rc=$?
          set -e
          if [[ "$rc" -eq 0 ]]; then
            echo "passed" > "$status_file"
          else
            echo "failed" > "$status_file"
          fi
          exit "$rc"

      - name: Write GitHub step summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render_github_actions_production_fetch_summary.py \
            --trade-date "$AS_OF" \
            --input-dir "inputs/daily/$AS_OF" \
            --output-dir "outputs/daily/$AS_OF" \
            --reports-dir "reports/daily/$AS_OF" \
            --connectivity-audit-dir "outputs/daily/$AS_OF/provider_connectivity_audit" >> "$GITHUB_STEP_SUMMARY"

          daily_pipeline_status="not_reached"
          if [[ -f "outputs/daily/$AS_OF/daily_pipeline_status.txt" ]]; then
            daily_pipeline_status="$(cat "outputs/daily/$AS_OF/daily_pipeline_status.txt")"
          fi
          {
            echo ""
            echo "### Daily production pipeline"
            echo "- daily_pipeline_status: \`$daily_pipeline_status\`"
            echo "- generated report paths:"
            echo "  - \`reports/daily/$AS_OF/${AS_OF}_tdt_rm_daily_report.md\`"
            echo "  - \`reports/daily/$AS_OF/latest_report.md\`"
            echo "  - \`outputs/daily/$AS_OF/tdt_rm_daily_${AS_OF}.json\`"
            echo "  - \`outputs/daily/$AS_OF/tdt_rm_daily_${AS_OF}.md\`"
            echo "  - \`outputs/daily/$AS_OF/tdt_rm_daily_${AS_OF}_manifest.json\`"
            echo "  - \`outputs/daily/$AS_OF/pipeline_summary.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production fetch artifacts
        id: upload-production-fetch-artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: tdt-rm-production-fetch-${{ steps.as-of.outputs.as_of }}
          path: |
            inputs/daily/${{ steps.as-of.outputs.as_of }}/
            outputs/daily/${{ steps.as-of.outputs.as_of }}/
            reports/daily/${{ steps.as-of.outputs.as_of }}/
            outputs/daily/${{ steps.as-of.outputs.as_of }}/fetch_manifest.json
            outputs/daily/${{ steps.as-of.outputs.as_of }}/summary.json
            outputs/daily/${{ steps.as-of.outputs.as_of }}/provider_connectivity_summary.json
            outputs/daily/${{ steps.as-of.outputs.as_of }}/provider_connectivity_audit/
            reports/daily/${{ steps.as-of.outputs.as_of }}/artifacts/production_fetch_summary.json
            reports/daily/${{ steps.as-of.outputs.as_of }}/artifacts/provider_health.json
          if-no-files-found: warn
          retention-days: 90

      - name: Commit daily production report back to repository
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          trade_date="${{ steps.as-of.outputs.trade_date }}"
          if [[ -z "$trade_date" ]]; then
            echo "Resolved trade_date is empty; cannot build daily report commit message." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          commit_paths=(
            "outputs/daily/$trade_date"
            "reports/daily/$trade_date"
            "inputs/daily/$trade_date"
          )

          existing_paths=()
          for path in "${commit_paths[@]}"; do
            if [[ -e "$path" ]]; then
              existing_paths+=("$path")
            fi
          done

          if [[ "${#existing_paths[@]}" -eq 0 ]]; then
            echo "NO_DAILY_REPORT_CHANGES_TO_COMMIT"
            echo "NO_DAILY_REPORT_CHANGES_TO_COMMIT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git add -- "${existing_paths[@]}"
          if git diff --cached --quiet; then
            echo "NO_DAILY_REPORT_CHANGES_TO_COMMIT"
            echo "NO_DAILY_REPORT_CHANGES_TO_COMMIT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "chore(daily): add production report $trade_date"
          git push

      - name: Append uploaded artifact digest to job summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo ""
            echo "### Uploaded artifact identity"
            echo "- run id: \`${{ github.run_id }}\`"
            echo "- commit sha: \`${{ github.sha }}\`"
            echo "- trade_date: \`${{ steps.as-of.outputs.trade_date }}\`"
            echo "- as_of date: \`${{ steps.as-of.outputs.as_of }}\`"
            echo "- artifact name: \`tdt-rm-production-fetch-${{ steps.as-of.outputs.as_of }}\`"
            echo "- artifact digest: \`${{ steps.upload-production-fetch-artifacts.outputs.artifact-digest || 'not available' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
